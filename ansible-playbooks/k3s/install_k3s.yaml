---
- name: Install single-node K3s cluster with kubeconfig
  hosts: k3s_server
  become: yes
  vars:
    k3s_version: "v1.34.1+k3s1"   # Change to desired version
    kubeconfig_user: "{{ ansible_user | default('ubuntu') }}"  # Local user to copy kubeconfig
    kubeconfig_path: "/home/{{ kubeconfig_user }}/.kube"
  tasks:

    - name: Ensure required packages are installed
      apt:
        name:
          - curl
          - sudo
          - iptables
          - conntrack
          - socat
          - ca-certificates
          - gnupg
          - lsb-release
        state: present
        update_cache: yes

    - name: Create K3s config directory
      file:
        path: /etc/rancher/k3s
        state: directory
        mode: "0755"

    - name: Write K3s config
      copy:
        content: |
          write-kubeconfig-mode: "0644"
        dest: /etc/rancher/k3s/config.yaml
        mode: "0644"

    - name: Install K3s server
      shell: |
        curl -sfL https://get.k3s.io | INSTALL_K3S_VERSION={{ k3s_version }} sh -
      args:
        executable: /bin/bash
      register: k3s_install
      changed_when: "'installed' in k3s_install.stdout or k3s_install.rc == 0"

    - name: Ensure K3s service is enabled and running
      systemd:
        name: k3s
        enabled: yes
        state: started

    - name: Wait for K3s to be ready
      shell: |
        until k3s kubectl get nodes &>/dev/null; do sleep 5; done
      retries: 10
      delay: 5
      register: k3s_ready
      until: k3s_ready.rc == 0

    - name: Create kubeconfig directory for user
      file:
        path: "{{ kubeconfig_path }}"
        state: directory
        owner: "{{ kubeconfig_user }}"
        group: "{{ kubeconfig_user }}"
        mode: "0755"


    - name: Copy K3s kubeconfig to user home
      copy:
        src: /etc/rancher/k3s/k3s.yaml
        dest: "{{ kubeconfig_path }}/config"
        owner: "{{ kubeconfig_user }}"
        group: "{{ kubeconfig_user }}"
        mode: "0600"
        remote_src: yes

    - name: Set KUBECONFIG globally
      copy:
        content: "export KUBECONFIG=/etc/rancher/k3s/k3s.yaml\n"
        dest: /etc/profile.d/kubeconfig.sh
        mode: "0644"

    - name: Display K3s node info
      shell: "sudo k3s kubectl get nodes -o wide"
      register: nodes_info
      changed_when: false

    - name: Show K3s node info
      debug:
        var: nodes_info.stdout_lines
